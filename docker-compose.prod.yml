services:
  postgres:
    image: postgres:16-alpine
    container_name: cypher-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cypher-secure-prod-db-password-change-me}
      POSTGRES_DB: cypher
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: cypher-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-cypher-secure-redis-password-change-me} --save 60 1 --loglevel warning
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cypher-secure-redis-password-change-me}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend-1: &backend_template
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cypher-backend:latest
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cypher-secure-redis-password-change-me}@redis:6379/0
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-cypher-secure-prod-db-password-change-me}@postgres:5432/cypher
      - JWT_SECRET=${JWT_SECRET:-cypher-ha-prod-secret-change-me-please}
      - RATE_LIMIT_PER_MINUTE=240
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  backend-2:
    <<: *backend_template

  nginx:
    image: nginx:stable-alpine
    container_name: cypher-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend-1
      - backend-2
    restart: always

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: cypher-agent:latest
    environment:
      - AGENT_ID=ha-production-agent
      - BACKEND_URL=http://nginx:80
      - TARGETS=nginx:80
      - PROBE_INTERVAL=10
    depends_on:
      - nginx
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
