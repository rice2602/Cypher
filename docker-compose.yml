services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-cypher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cypher}
      POSTGRES_DB:       ${POSTGRES_DB:-cypher}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cypher}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:        ${DATABASE_URL:-postgresql://cypher:cypher@postgres:5432/cypher}
      REDIS_URL:           ${REDIS_URL:-redis://redis:6379/0}
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:    ${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Agent ────────────────────────────────────────────────────────────────────

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    restart: unless-stopped
    environment:
      AGENT_ID:       ${AGENT_ID:-agent-01}
      TARGETS:        ${TARGETS:-google.com:443,8.8.8.8:53}
      BACKEND_URL:    ${BACKEND_URL:-http://backend:8000}
      PROBE_INTERVAL: ${PROBE_INTERVAL:-30}
      PROBE_TIMEOUT:  ${PROBE_TIMEOUT:-5}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
