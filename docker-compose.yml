services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-cypher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cypher}
      POSTGRES_DB:       ${POSTGRES_DB:-cypher}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cypher}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:        ${DATABASE_URL:-postgresql+asyncpg://cypher:cypher@postgres:5432/cypher}
      REDIS_URL:           ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET:          ${JWT_SECRET:-cypher-change-me-in-production}
      SINGLE_USER_MODE:    ${SINGLE_USER_MODE:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      CORS_ORIGINS:        ${CORS_ORIGINS:-*}
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:    ${TELEGRAM_CHAT_ID:-}
      SLACK_WEBHOOK_URL:   ${SLACK_WEBHOOK_URL:-}
      TEAMS_WEBHOOK_URL:   ${TEAMS_WEBHOOK_URL:-}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-}
      GENERIC_WEBHOOK_URL: ${GENERIC_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Agent ────────────────────────────────────────────────────────────────────

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    restart: unless-stopped
    environment:
      AGENT_ID:       ${AGENT_ID:-agent-01}
      TARGETS:        ${TARGETS:-google.com:443,8.8.8.8:53}
      BACKEND_URL:    ${BACKEND_URL:-http://backend:8000}
      PROBE_INTERVAL: ${PROBE_INTERVAL:-30}
      PROBE_TIMEOUT:  ${PROBE_TIMEOUT:-5}
      AGENT_KEY_ID:   ${AGENT_KEY_ID:-}
      AGENT_KEY_SECRET: ${AGENT_KEY_SECRET:-}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
