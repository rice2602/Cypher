# render.yaml — Render deployment blueprint for Cypher v1
# Deploy: connect your GitHub repo on https://dashboard.render.com → New → Blueprint

services:
  - type: web
    name: cypher-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      # PostgreSQL — auto-filled from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: cypher-db
          property: connectionString

      # Redis — set this manually from Upstash (https://upstash.com)
      # Format: redis://default:<password>@<host>:<port>
      - key: REDIS_URL
        sync: false

      # JWT secret — auto-generated random value
      - key: JWT_SECRET
        generateValue: true

      # Rate limiting (requests per minute per agent/IP)
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"

      # CORS — set to your frontend origin (or * for open)
      - key: CORS_ORIGINS
        value: "*"

      # ── Optional notifications ──────────────────────────────────────────────
      # Uncomment and fill in to enable Telegram alerts:
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_CHAT_ID
      #   sync: false

      # Uncomment to enable Slack alerts:
      # - key: SLACK_WEBHOOK_URL
      #   sync: false

databases:
  - name: cypher-db
    databaseName: cypher
    plan: free   # 90-day free trial; upgrade or migrate to Neon for permanent free tier
    # See README.md for instructions on using Neon (https://neon.tech) instead
