user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Load balancing upstream backend group
    upstream cypher_backends {
        server backend-1:8000 max_fails=3 fail_timeout=10s;
        server backend-2:8000 max_fails=3 fail_timeout=10s;
    }

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name localhost;

        # Health endpoint fallback without SSL check
        location /healthz {
            return 200 'healthy';
            add_header Content-Type text/plain;
        }

        # Redirect standard requests
        location / {
            # In local dev/testing where SSL keys are absent, fall back to proxying HTTP directly.
            # In a production environment with valid SSL certs, uncomment the line below:
            # return 301 https://$host$request_uri;

            proxy_pass http://cypher_backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Production HTTPS Configuration
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cypher.crt;
        ssl_certificate_key /etc/nginx/certs/cypher.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://cypher_backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
