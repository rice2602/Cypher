<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cypher — Network Monitoring</title>
  <meta name="description" content="Cypher is a self-hosted network monitoring platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#080c18;--bg-card:rgba(255,255,255,0.04);--bg-card-hov:rgba(255,255,255,0.07);
      --border:rgba(255,255,255,0.08);--border-hov:rgba(255,255,255,0.16);
      --text:#e2e8f0;--text-muted:#64748b;--text-dim:#94a3b8;
      --blue:#3b82f6;--blue-dark:#1d4ed8;--blue-glow:rgba(59,130,246,0.25);
      --green:#10b981;--green-glow:rgba(16,185,129,0.2);
      --red:#ef4444;--red-glow:rgba(239,68,68,0.2);
      --yellow:#f59e0b;--yellow-glow:rgba(245,158,11,0.15);
      --purple:#8b5cf6;--radius:12px;--radius-sm:8px;
      --shadow:0 4px 24px rgba(0,0,0,0.4);--transition:0.2s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    a{color:var(--blue);text-decoration:none}
    button{cursor:pointer;border:none;font-family:inherit}
    input,textarea,select{font-family:inherit;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 14px;font-size:14px;outline:none;transition:border var(--transition),box-shadow var(--transition);width:100%}
    input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
    select option{background:#1e293b}
    label{display:block;font-size:13px;font-weight:500;color:var(--text-dim);margin-bottom:6px}

    #app{display:flex;min-height:100vh}
    #sidebar{width:240px;min-height:100vh;flex-shrink:0;background:rgba(255,255,255,0.02);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform var(--transition)}
    .sidebar-logo{padding:24px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
    .logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;box-shadow:0 0 16px var(--blue-glow)}
    .logo-text{font-size:18px;font-weight:700;letter-spacing:-0.5px}
    .logo-text span{color:var(--blue)}
    .sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all var(--transition);user-select:none}
    .nav-item:hover{background:var(--bg-card);color:var(--text)}
    .nav-item.active{background:rgba(59,130,246,0.12);color:var(--blue)}
    .nav-item .icon{font-size:16px;width:20px;text-align:center}
    .sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)}
    .sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--bg-card)}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
    .user-info{min-width:0}.user-name{font-size:13px;font-weight:600;color:var(--text)}
    .user-key{font-size:10px;color:var(--text-muted);font-family:monospace}

    #main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
    #topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,12,24,0.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
    .topbar-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
    .topbar-actions{display:flex;gap:10px;align-items:center}
    #content{padding:28px;flex:1}

    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all var(--transition)}
    .card:hover{border-color:var(--border-hov)}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .card-title{font-size:15px;font-weight:600}

    .status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .target-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all var(--transition);cursor:pointer}
    .target-card:hover{border-color:var(--border-hov);transform:translateY(-2px);box-shadow:var(--shadow)}
    .target-card.up{border-left:3px solid var(--green)}
    .target-card.degraded{border-left:3px solid var(--yellow)}
    .target-card.down{border-left:3px solid var(--red)}
    .target-card.stale{border-left:3px solid var(--text-muted)}
    .target-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
    .target-name{font-size:15px;font-weight:700;word-break:break-all}
    .target-meta{display:flex;gap:12px;margin-top:8px;font-size:12px;color:var(--text-muted)}
    .target-meta span{display:flex;align-items:center;gap:4px}
    .target-latency{font-size:22px;font-weight:700;margin:6px 0 2px}
    .target-latency small{font-size:12px;font-weight:400;color:var(--text-muted)}
    .target-time{font-size:11px;color:var(--text-muted)}

    .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;flex-shrink:0;margin-left:8px}
    .badge-up{background:rgba(16,185,129,0.15);color:var(--green)}
    .badge-down{background:rgba(239,68,68,0.15);color:var(--red)}
    .badge-degraded{background:var(--yellow-glow);color:var(--yellow)}
    .badge-stale{background:rgba(100,116,139,0.15);color:var(--text-muted)}
    .badge-unknown{background:rgba(100,116,139,0.15);color:var(--text-muted)}
    .badge-active{background:rgba(16,185,129,0.15);color:var(--green)}

    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
    .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
    .stat-label{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:8px}
    .stat-value{font-size:28px;font-weight:800;letter-spacing:-1px}
    .stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}
    .stat-value.blue{color:var(--blue)}.stat-value.yellow{color:var(--yellow)}

    .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    thead{background:rgba(255,255,255,0.03)}
    th{padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap}
    td{padding:14px 16px;border-top:1px solid var(--border);vertical-align:middle}
    tr:hover td{background:rgba(255,255,255,0.02)}
    .cell-muted{color:var(--text-muted);font-size:12px}
    .cell-code{font-family:monospace;font-size:12px;color:var(--blue);background:rgba(59,130,246,0.1);padding:2px 6px;border-radius:4px}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all var(--transition)}
    .btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;box-shadow:0 2px 8px var(--blue-glow)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px var(--blue-glow)}
    .btn-ghost{background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--bg-card-hov);color:var(--text);border-color:var(--border-hov)}
    .btn-danger{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
    .btn-danger:hover{background:rgba(239,68,68,0.2)}
    .btn-sm{padding:6px 12px;font-size:12px}
    .btn-icon{padding:7px;border-radius:8px}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.15s ease}
    .modal{background:#0f172a;border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:slideUp 0.2s ease}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}

    .key-reveal{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);border-radius:var(--radius-sm);padding:16px;margin:16px 0}
    .key-reveal h4{color:var(--green);font-size:13px;margin-bottom:10px}
    .key-row{margin-bottom:10px}
    .key-row label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
    .key-row code{display:block;font-family:monospace;font-size:12px;background:rgba(255,255,255,0.06);padding:8px 10px;border-radius:6px;word-break:break-all;color:var(--text)}
    .key-warning{font-size:12px;color:var(--yellow);background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:6px;padding:8px 10px;margin-top:8px}

    .incident-row td:first-child{border-left:3px solid var(--red)}
    .diag-block{font-family:monospace;font-size:11px;background:rgba(0,0,0,0.4);padding:10px;border-radius:6px;max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;color:var(--text-dim)}

    .form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:480px){.form-grid-2{grid-template-columns:1fr}}
    .form-row{margin-bottom:14px}

    .type-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
    .type-host{background:rgba(59,130,246,0.15);color:#93c5fd}
    .type-url{background:rgba(139,92,246,0.15);color:#c4b5fd}
    .type-subnet{background:rgba(245,158,11,0.15);color:#fcd34d}
    .type-vmware{background:rgba(16,185,129,0.15);color:#6ee7b7}
    .type-custom{background:rgba(100,116,139,0.15);color:#94a3b8}

    .empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;text-align:center;color:var(--text-muted)}
    .empty-icon{font-size:40px;margin-bottom:16px;opacity:0.5}
    .empty h3{font-size:16px;font-weight:600;color:var(--text-dim);margin-bottom:8px}
    .empty p{font-size:13px;max-width:320px;line-height:1.6}

    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:16px}

    .pulse{display:inline-flex;align-items:center;gap:6px}
    .pulse-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
    .pulse-dot.green{background:var(--green);box-shadow:0 0 0 0 var(--green-glow)}
    .pulse-dot.red{background:var(--red);box-shadow:0 0 0 0 var(--red-glow)}

    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .page-header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px}
    .page-header p{font-size:13px;color:var(--text-muted);margin-top:4px}

    #toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
    .toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:slideLeft 0.25s ease;display:flex;align-items:center;gap:8px;max-width:340px}
    .toast-success{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7}
    .toast-error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
    .toast-info{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#93c5fd}

    /* Detail modal agent table */
    .detail-agent-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .detail-agent-row:last-child{border-bottom:none}
    .detail-agent-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .detail-agent-dot.up{background:var(--green)}.detail-agent-dot.down{background:var(--red)}
    .detail-agent-dot.stale{background:var(--text-muted)}
    .detail-agent-info{flex:1;min-width:0}
    .detail-agent-name{font-size:13px;font-weight:600}
    .detail-agent-meta{font-size:11px;color:var(--text-muted)}
    .detail-agent-latency{font-size:13px;font-weight:600;text-align:right}

    #hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text)}
    @media(max-width:768px){
      #hamburger{display:block}
      #sidebar{transform:translateX(-100%)}
      #sidebar.open{transform:translateX(0)}
      #main{margin-left:0}
      #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
      #overlay.show{display:block}
    }

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
    @keyframes slideLeft{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
    @keyframes shimmer{to{background-position:-200% 0}}
    @keyframes pulse{0%{box-shadow:0 0 0 0 currentColor}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
  </style>
</head>
<body>

<div id="app" style="display:none">
  <div id="overlay" onclick="closeSidebar()"></div>
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#9889;</div>
      <div class="logo-text">Cy<span>pher</span></div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')"><span class="icon">&#128225;</span> Dashboard</div>
      <div class="nav-item" data-page="destinations" onclick="navigate('destinations')"><span class="icon">&#127919;</span> Destinations</div>
      <div class="nav-item" data-page="agents" onclick="navigate('agents')"><span class="icon">&#129302;</span> Agents</div>
      <div class="nav-item" data-page="incidents" onclick="navigate('incidents')"><span class="icon">&#128680;</span> Incidents</div>
      <div class="nav-item" data-page="uptime" onclick="navigate('uptime')"><span class="icon">&#128200;</span> Uptime</div>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">C</div>
        <div class="user-info">
          <div class="user-name">Cypher</div>
          <div class="user-key">Local Mode</div>
        </div>
      </div>
    </div>
  </nav>
  <div id="main">
    <header id="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <span class="topbar-title" id="topbar-title">Dashboard</span>
      </div>
      <div class="topbar-actions">
        <span class="pulse"><span class="pulse-dot green" id="status-dot"></span><span style="font-size:12px;color:var(--text-muted)" id="status-label">Live</span></span>
      </div>
    </header>
    <div id="content"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const API='';
let currentPage='dashboard',refreshTimer=null;
let _destCache=[],_agentCache=[];

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'},...(body?{body:JSON.stringify(body)}:{})};
  const res=await fetch(API+path,opts);
  if(res.status===204)return null;
  const data=await res.json();
  if(!res.ok)throw new Error(data.detail||`HTTP ${res.status}`);
  return data;
}

function toast(msg,type='info'){
  const el=document.createElement('div');el.className=`toast toast-${type}`;
  const icons={success:'&#10003;',error:'&#10007;',info:'&#8505;'};
  el.innerHTML=`<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

function showApp(){
  document.getElementById('app').style.display='flex';
  navigate('dashboard');startAutoRefresh();
  document.addEventListener('click',function(ev){
    const btn=ev.target.closest('[data-action]');
    if(!btn)return;
    const a=btn.dataset.action;
    if(a==='edit-dest'){const id=parseInt(btn.dataset.id);const d=_destCache.find(x=>x.id===id);if(d)openDestModal(d)}
    else if(a==='delete-dest')deleteDest(parseInt(btn.dataset.id),btn.dataset.name);
    else if(a==='edit-agent')editAgent(parseInt(btn.dataset.idx));
    else if(a==='delete-agent')deleteAgent(parseInt(btn.dataset.id),btn.dataset.name);
    else if(a==='copy'){navigator.clipboard.writeText(btn.dataset.text);toast('Copied','success')}
    else if(a==='toggle-vis'){
      const el=document.getElementById(btn.dataset.target);
      if(el)el.type=el.type==='password'?'text':'password';
    }
  });
}

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  const titles={dashboard:'Dashboard',destinations:'Destinations',agents:'Agents',incidents:'Incidents',uptime:'Uptime'};
  document.getElementById('topbar-title').textContent=titles[page]||page;
  closeSidebar();renderPage(page);
}

function startAutoRefresh(){
  clearInterval(refreshTimer);
  refreshTimer=setInterval(()=>{if(currentPage==='dashboard')renderPage('dashboard')},15000);
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}

function renderPage(page){
  const pages={dashboard:renderDashboard,destinations:renderDestinations,agents:renderAgents,incidents:renderIncidents,uptime:renderUptime};
  (pages[page]||(()=>{}))();
}

// ─── Dashboard ────────────────────────────────────────────────────────────
async function renderDashboard(){
  const el=document.getElementById('content');
  el.innerHTML=`<div class="stats-row">${[1,2,3,4].map(()=>`<div class="stat-card"><div class="skeleton" style="width:60%;margin-bottom:10px"></div><div class="skeleton" style="width:40%;height:24px"></div></div>`).join('')}</div><div class="card"><div class="skeleton" style="height:200px"></div></div>`;
  try{
    const[summaryData,metricsData]=await Promise.all([
      api('GET','/api/v1/status/summary'),
      api('GET','/api/v1/metrics/uptime')
    ]);
    const targets=summaryData.targets||[];
    const stats=summaryData.stats||{total:0,up:0,degraded:0,down:0};
    const metrics=metricsData.metrics||{};
    const avgUptime=Object.values(metrics).length
      ?(Object.values(metrics).reduce((a,m)=>a+m.availability_percentage,0)/Object.values(metrics).length).toFixed(1)
      :'&#8212;';

    el.innerHTML=`
      <div class="page-header"><div><h1>Dashboard</h1><p>Live monitoring overview</p></div></div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Targets</div><div class="stat-value blue">${stats.total}</div></div>
        <div class="stat-card"><div class="stat-label">Healthy</div><div class="stat-value green">${stats.up}</div></div>
        <div class="stat-card"><div class="stat-label">Degraded</div><div class="stat-value yellow">${stats.degraded}</div></div>
        <div class="stat-card"><div class="stat-label">Down</div><div class="stat-value red">${stats.down}</div></div>
      </div>

      <div class="card" style="margin-bottom:24px">
        <div class="card-header"><span class="card-title">Target Status</span></div>
        ${targets.length===0?emptyState('No data yet','Deploy an agent and register destinations to start monitoring.'):`
        <div class="status-grid">${targets.map(t=>targetCard(t)).join('')}</div>`}
      </div>`;
  }catch(err){el.innerHTML=errorState(err.message)}
}

function targetCard(t){
  const cls=t.status.toLowerCase();
  const badgeCls='badge-'+cls;
  const lat=t.avg_latency_ms!=null?`${t.avg_latency_ms}<small> ms</small>`:'&#8212;';
  return`<div class="target-card ${cls}" onclick='openTargetDetail(${JSON.stringify(t.target).replace(/'/g,"&#39;")})'>
    <div class="target-header">
      <div><div class="target-name">${e(t.target)}</div></div>
      <span class="badge ${badgeCls}">${t.status}</span>
    </div>
    <div class="target-latency">${lat}</div>
    <div class="target-meta">
      <span>&#129302; ${t.agents_up}/${t.agent_count} up</span>
      <span>${t.is_stale?'&#9888; Stale':'&#9989; Live'}</span>
    </div>
    <div class="target-time">${t.last_seen?'Last seen: '+relTime(t.last_seen):'No data'}</div>
  </div>`;
}

async function openTargetDetail(targetName){
  const summaryData=await api('GET','/api/v1/status/summary');
  const target=(summaryData.targets||[]).find(t=>t.target===targetName);
  if(!target)return;

  let incidentsHtml='';
  try{
    const incData=await api('GET',`/api/v1/incidents?limit=10&target=${encodeURIComponent(targetName)}`);
    const incidents=incData.incidents||[];
    if(incidents.length){
      incidentsHtml=`<div style="margin-top:20px"><h4 style="font-size:14px;margin-bottom:12px;color:var(--text-dim)">Recent Incidents</h4>
        ${incidents.map(i=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="color:var(--text-muted)">${e(i.agent_uid)}</span>
            <span style="color:var(--text-muted)">${relTime(i.created_at)}</span>
          </div>
          <div style="color:var(--text-dim)">${e(i.error||i.root_cause||'&#8212;')}</div>
        </div>`).join('')}</div>`;
    }
  }catch(ex){}

  const agentRows=target.agent_details.map(a=>{
    const dotCls=a.status.toLowerCase();
    const lat=a.latency_ms!=null?`${a.latency_ms} ms`:'&#8212;';
    return`<div class="detail-agent-row">
      <div class="detail-agent-dot ${dotCls}"></div>
      <div class="detail-agent-info">
        <div class="detail-agent-name">${e(a.agent_name)}</div>
        <div class="detail-agent-meta">${e(a.region||'unknown')} &middot; ${e(a.hostname||'unknown')} &middot; ${a.last_seen?relTime(a.last_seen):'no data'}</div>
      </div>
      <div class="detail-agent-latency">${lat}</div>
    </div>`;
  }).join('');

  createModal(`${e(targetName)}`,`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <span class="badge badge-${target.status.toLowerCase()}" style="font-size:13px;padding:5px 14px">${target.status}</span>
      <span style="font-size:13px;color:var(--text-muted)">${target.agents_up}/${target.agent_count} agents up &middot; ${target.avg_latency_ms!=null?'avg '+target.avg_latency_ms+' ms':'no latency data'}</span>
    </div>
    <h4 style="font-size:14px;margin-bottom:12px;color:var(--text-dim)">Agent Breakdown</h4>
    ${target.agent_details.length?agentRows:'<div style="color:var(--text-muted);font-size:13px;padding:12px 0">No agent data</div>'}
    ${incidentsHtml}
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
  `);
}

// ─── Destinations ─────────────────────────────────────────────────────────
async function renderDestinations(){
  const el=document.getElementById('content');
  el.innerHTML=`<div class="page-header"><div><h1>Destinations</h1><p>The targets you want to monitor</p></div><button class="btn btn-primary" onclick="openDestModal()">&#65291; Add Destination</button></div><div id="dest-table-wrap"><div class="skeleton" style="height:200px;border-radius:12px"></div></div>`;

}

async function loadDestTable(){

  try{
    const data=await api('GET','/api/v1/destinations');const dests=data||[];
    if(!dests.length){wrap.innerHTML=`<div class="card">${emptyState('No destinations yet','Add your first destination to start monitoring.')}</div>`;return}
    _destCache=dests;
    wrap.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Name</th><th>URL / Host</th><th>Type</th><th>Port</th><th>Tags</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${dests.map(d=>`<tr>
        <td><strong>${e(d.name)}</strong>${d.description?`<div class="cell-muted">${e(d.description)}</div>`:''}</td>
        <td class="cell-code">${e(d.url)}</td>
        <td><span class="type-pill type-${d.type}">${e(d.type)}</span></td>
        <td class="cell-muted">${d.port||'&#8212;'}</td>
        <td class="cell-muted">${d.tags||'&#8212;'}</td>

      </tr>`).join('')}</tbody></table></div>`;

function openDestModal(dest=null){
  const isEdit=!!dest;
  createModal(`${isEdit?'Edit':'Add'} Destination`,`
    <div class="form-grid-2"><div class="form-row"><label>Name *</label><input id="d-name" value="${isEdit?e(dest.name):''}" placeholder="e.g. Production API" required /></div>
    <div class="form-row"><label>Type *</label><select id="d-type">${['host','url','subnet','vmware','custom'].map(t=>`<option value="${t}" ${isEdit&&dest.type===t?'selected':''}>${t}</option>`).join('')}</select></div></div>
    <div class="form-row"><label>URL / Host / Subnet *</label><input id="d-url" value="${isEdit?e(dest.url):''}" placeholder="e.g. api.example.com" required /></div>
    <div class="form-grid-2"><div class="form-row"><label>Port</label><input id="d-port" type="number" min="1" max="65535" value="${isEdit&&dest.port?dest.port:''}" placeholder="e.g. 443" /></div>

async function saveDest(id){
  const btn=document.getElementById('dest-save-btn');btn.textContent='Saving\u2026';btn.disabled=true;
  const body={name:document.getElementById('d-name').value,url:document.getElementById('d-url').value,type:document.getElementById('d-type').value,port:document.getElementById('d-port').value?parseInt(document.getElementById('d-port').value):null,tags:document.getElementById('d-tags').value||null,description:document.getElementById('d-desc').value||null,is_active:document.getElementById('d-active').checked};
  try{if(id){await api('PUT',`/api/v1/destinations/${id}`,body);toast('Destination updated','success')}else{await api('POST','/api/v1/destinations',body);toast('Destination created','success')}closeModal();await loadDestTable()}
  catch(err){toast(err.message,'error')}finally{btn.textContent=id?'Save':'Create';btn.disabled=false}

async function deleteDest(id,name){if(!confirm(`Delete destination "${name}"?`))return;try{await api('DELETE',`/api/v1/destinations/${id}`);toast('Deleted','success');await loadDestTable()}catch(err){toast(err.message,'error')}}

// ─── Agents ───────────────────────────────────────────────────────────────
async function renderAgents(){
  const el=document.getElementById('content');
  el.innerHTML=`<div class="page-header"><div><h1>Agents</h1><p>Monitoring agents</p></div><button class="btn btn-primary" onclick="openAgentModal()">&#65291; Register Agent</button></div><div id="agent-table-wrap"><div class="skeleton" style="height:200px;border-radius:12px"></div></div>`;
  await loadAgentTable();
}

async function loadAgentTable(){
  const wrap=document.getElementById('agent-table-wrap');if(!wrap)return;
  try{
    const[agentsData,destsData]=await Promise.all([api('GET','/api/v1/agents'),api('GET','/api/v1/destinations')]);
    _destCache=destsData||[];const agents=agentsData||[];_agentCache=agents;
    if(!agents.length){wrap.innerHTML=`<div class="card">${emptyState('No agents registered','Register an agent to start monitoring.')}</div>`;return}
    const destMap={};_destCache.forEach(d=>{destMap[d.id]=d.name});
    wrap.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Name</th><th>Agent UID</th><th>Location</th><th>Destinations</th><th>Last Seen</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${agents.map((a,idx)=>{
        const lastSeen=a.last_seen?relTime(a.last_seen):'Never';
        const status=a.last_seen?'Active':'Offline';
        const assigned=(a.destination_ids||[]).map(id=>destMap[id]||`#${id}`).join(', ')||'All destinations';
        return`<tr>
          <td><strong>${e(a.name)}</strong>${a.description?`<div class="cell-muted">${e(a.description)}</div>`:''}</td>
          <td class="cell-code">${e(a.agent_uid)}</td>
          <td class="cell-muted">${e(a.location||'&#8212;')}</td>
          <td class="cell-muted" style="font-size:12px">${e(assigned)}</td>
          <td class="cell-muted">${lastSeen}</td>
          <td>${a.last_seen?'<span class="badge badge-active">Active</span>':'<span class="badge badge-stale">Offline</span>'}</td>
          <td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" data-action="edit-agent" data-idx="${idx}">Edit</button> <button class="btn btn-danger btn-sm" data-action="delete-agent" data-id="${a.id}" data-name="${e(a.name)}">Delete</button></td>
        </tr>`}).join('')}</tbody></table></div>`;
  }catch(err){wrap.innerHTML=errorState(err.message)}
}

async function openAgentModal(){
  let dests=_destCache;
  if(!dests.length){try{dests=_destCache=await api('GET','/api/v1/destinations')||[]}catch(ex){dests=[]}}
  const destSection=dests.length?`
    <div class="form-row"><label>Destinations (optional — leave empty for all)</label>
      <div id="a-dest-list" style="display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:10px">
        ${dests.map(d=>`<label style="display:flex;align-items:center;gap:8px;margin:0;cursor:pointer"><input type="checkbox" data-id="${d.id}" style="width:auto" /><span><strong>${e(d.name)}</strong> <span style="color:var(--text-muted);font-size:11px">${e(d.url)}</span></span></label>`).join('')}
      </div></div>`:'';

  createModal('Register Agent',`
    <div class="form-row"><label>Agent Name *</label><input id="a-name" placeholder="e.g. HQ-Router-Agent" required /></div>
    <div class="form-grid-2"><div class="form-row"><label>Location</label><input id="a-location" placeholder="e.g. HQ, AWS-us-east" /></div><div class="form-row"><label>Region</label><input id="a-region" placeholder="e.g. us-east-1" /></div></div>
    <div class="form-row"><label>Description</label><textarea id="a-desc" rows="2"></textarea></div>
    ${destSection}
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="agent-save-btn">Register &#8594;</button></div>

async function saveAgent(){
  const btn=document.getElementById('agent-save-btn');btn.textContent='Registering\u2026';btn.disabled=true;
  const destCheckboxes=document.querySelectorAll('#a-dest-list input[type=checkbox]:checked');
  const destIds=destCheckboxes.length?[...destCheckboxes].map(el=>parseInt(el.dataset.id)):null;
  try{
    const data=await api('POST','/api/v1/agents',{
      name:document.getElementById('a-name').value,
      location:document.getElementById('a-location').value||null,
      description:document.getElementById('a-desc').value||null,
      destination_ids:destIds

    closeModal();
    showInlineCredentials(data);
    await loadAgentTable();
  }catch(err){toast(err.message,'error')}finally{btn.textContent='Register \u2192';btn.disabled=false}
}

function editAgent(idx){

async function updateAgent(id){
  const btn=document.getElementById('agent-save-btn');btn.textContent='Saving\u2026';btn.disabled=true;
  const destCheckboxes=document.querySelectorAll('#a-dest-list input[type=checkbox]:checked');

async function deleteAgent(id,name){if(!confirm(`Delete agent "${name}"?`))return;try{await api('DELETE',`/api/v1/agents/${id}`);toast('Deleted','success');await loadAgentTable()}catch(err){toast(err.message,'error')}}

async function renderUptime(){
  const el=document.getElementById('content');
  el.innerHTML=`<div class="page-header"><div><h1>Uptime</h1><p>7-day availability by target</p></div></div><div id="uptime-wrap"><div class="skeleton" style="height:300px;border-radius:12px"></div></div>`;

    document.getElementById('uptime-wrap').innerHTML=`<div class="card"><div style="display:flex;flex-direction:column;gap:16px">
      ${metrics.map(m=>{const pct=m.availability_percentage;const cls=pct>=99?'high':pct>=95?'med':'low';
        return`<div><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:14px;font-weight:600">${e(m.target)}</span><span style="font-size:14px;font-weight:700;color:${cls==='high'?'var(--green)':cls==='med'?'var(--yellow)':'var(--red)'}">${pct.toFixed(2)}%</span></div>
        <div style="height:8px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden"><div style="height:100%;border-radius:10px;width:${Math.min(pct,100)}%;background:${cls==='high'?'var(--green)':cls==='med'?'var(--yellow)':'var(--red)'}"></div></div>
        <div style="display:flex;gap:16px;margin-top:4px;font-size:11px;color:var(--text-muted)"><span>&#8593; ${m.up_probes} up</span><span>&#8635; ${m.total_probes} total</span><span>&#8595; ${m.total_probes-m.up_probes} down</span></div></div>`}).join('')}
    </div></div>`;
  }catch(err){document.getElementById('uptime-wrap').innerHTML=errorState(err.message)}
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function createModal(title,body){
  closeModal();
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.onclick=ev=>{if(ev.target===overlay)closeModal()};
  overlay.innerHTML=`<div class="modal"><div class="modal-title">${title}</div>${body}</div>`;
  document.body.appendChild(overlay);return overlay;
}
function closeModal(){const m=document.getElementById('modal-overlay');if(m)m.remove()}
function emptyState(title,text){return`<div class="empty"><div class="empty-icon">&#128229;</div><h3>${title}</h3><p>${text}</p></div>`}
function errorState(msg){return`<div class="card"><div class="empty"><div class="empty-icon">&#9888;&#65039;</div><h3>Error</h3><p>${e(msg)}</p></div></div>`}
function e(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function relTime(iso){if(!iso)return'&#8212;';const diff=Date.now()-new Date(iso).getTime();if(diff<60000)return'just now';if(diff<3600000)return`${Math.floor(diff/60000)}m ago`;if(diff<86400000)return`${Math.floor(diff/3600000)}h ago`;return`${Math.floor(diff/86400000)}d ago`}

showApp();
</script>
