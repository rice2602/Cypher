<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cypher — Network Monitoring</title>
  <meta name="description" content="Cypher is a self-hosted network monitoring platform. Monitor your hosts, URLs, subnets and VMware nodes from a single dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design Tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg:          #080c18;
      --bg-card:     rgba(255,255,255,0.04);
      --bg-card-hov: rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.08);
      --border-hov:  rgba(255,255,255,0.16);
      --text:        #e2e8f0;
      --text-muted:  #64748b;
      --text-dim:    #94a3b8;
      --blue:        #3b82f6;
      --blue-dark:   #1d4ed8;
      --blue-glow:   rgba(59,130,246,0.25);
      --green:       #10b981;
      --green-glow:  rgba(16,185,129,0.2);
      --red:         #ef4444;
      --red-glow:    rgba(239,68,68,0.2);
      --yellow:      #f59e0b;
      --purple:      #8b5cf6;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
      --transition:  0.2s ease;
    }

    /* ─── Reset & Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: var(--blue); text-decoration: none; }
    button { cursor: pointer; border: none; font-family: inherit; }
    input, textarea, select {
      font-family: inherit;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
      width: 100%;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }
    select option { background: #1e293b; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; }

    /* ─── Layout ────────────────────────────────────────────────────────────── */
    #app { display: flex; min-height: 100vh; }

    /* Sidebar */
    #sidebar {
      width: 240px; min-height: 100vh; flex-shrink: 0;
      background: rgba(255,255,255,0.02);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform var(--transition);
    }
    .sidebar-logo {
      padding: 24px 20px 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      box-shadow: 0 0 16px var(--blue-glow);
    }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text span { color: var(--blue); }

    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; color: var(--text-muted);
      cursor: pointer; transition: all var(--transition);
      user-select: none;
    }
    .nav-item:hover { background: var(--bg-card); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,0.12); color: var(--blue); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted);
    }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: var(--radius-sm);
      background: var(--bg-card);
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-info { min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-key { font-size: 10px; color: var(--text-muted); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Main content */
    #main {
      flex: 1; margin-left: 240px;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    #topbar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,12,24,0.8); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    #content { padding: 28px; flex: 1; }

    /* ─── Auth Screen ───────────────────────────────────────────────────────── */
    #auth-screen {
      min-height: 100vh;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    #auth-screen::before {
      content: '';
      position: absolute; top: -200px; left: -200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    #auth-screen::after {
      content: '';
      position: absolute; bottom: -200px; right: -200px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      position: relative; z-index: 1;
    }
    .auth-logo {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .auth-logo .logo-icon { width: 44px; height: 44px; font-size: 20px; }
    .auth-logo .logo-text { font-size: 22px; }
    .auth-tabs {
      display: flex; gap: 4px; margin-bottom: 28px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 4px;
    }
    .auth-tab {
      flex: 1; padding: 8px; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      transition: all var(--transition);
    }
    .auth-tab.active { background: var(--blue); color: #fff; box-shadow: 0 2px 8px var(--blue-glow); }
    .form-group { margin-bottom: 18px; }
    .auth-submit {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: #fff; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600;
      transition: all var(--transition);
      box-shadow: 0 4px 12px var(--blue-glow);
      margin-top: 8px;
    }
    .auth-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--blue-glow); }
    .auth-submit:active { transform: none; }
    .user-key-box {
      margin-top: 20px; padding: 14px;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: var(--radius-sm);
    }
    .user-key-box p { font-size: 12px; color: var(--green); margin-bottom: 6px; font-weight: 600; }
    .user-key-box code {
      font-size: 12px; font-family: monospace;
      color: var(--text); word-break: break-all;
      background: rgba(255,255,255,0.06);
      padding: 6px 8px; border-radius: 6px; display: block;
    }

    /* ─── Cards ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: all var(--transition);
    }
    .card:hover { border-color: var(--border-hov); }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-size: 15px; font-weight: 600; }

    /* Status grid */
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .status-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: all var(--transition);
      cursor: default;
    }
    .status-card:hover { border-color: var(--border-hov); transform: translateY(-2px); }
    .status-card.up { border-left: 3px solid var(--green); }
    .status-card.down { border-left: 3px solid var(--red); }
    .status-card.unknown { border-left: 3px solid var(--text-muted); }
    .status-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .status-target { font-size: 14px; font-weight: 600; word-break: break-all; }
    .status-agent { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      flex-shrink: 0; margin-left: 8px;
    }
    .badge-up { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge-down { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-unknown { background: rgba(100,116,139,0.15); color: var(--text-muted); }
    .status-latency { font-size: 22px; font-weight: 700; margin: 8px 0 4px; }
    .status-latency small { font-size: 12px; font-weight: 400; color: var(--text-muted); }
    .status-time { font-size: 11px; color: var(--text-muted); }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.blue { color: var(--blue); }

    /* ─── Tables ────────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead { background: rgba(255,255,255,0.03); }
    th {
      padding: 12px 16px; text-align: left;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      white-space: nowrap;
    }
    td { padding: 14px 16px; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .cell-muted { color: var(--text-muted); font-size: 12px; }
    .cell-code { font-family: monospace; font-size: 12px; color: var(--blue); background: rgba(59,130,246,0.1); padding: 2px 6px; border-radius: 4px; }

    /* ─── Buttons ───────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      transition: all var(--transition);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: #fff; box-shadow: 0 2px 8px var(--blue-glow);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px var(--blue-glow); }
    .btn-ghost {
      background: var(--bg-card); color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-card-hov); color: var(--text); border-color: var(--border-hov); }
    .btn-danger {
      background: rgba(239,68,68,0.12); color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { padding: 7px; border-radius: 8px; }

    /* ─── Modal ─────────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: slideUp 0.2s ease;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* Key reveal box */
    .key-reveal {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: var(--radius-sm);
      padding: 16px; margin: 16px 0;
    }
    .key-reveal h4 { color: var(--green); font-size: 13px; margin-bottom: 10px; }
    .key-row { margin-bottom: 10px; }
    .key-row label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .key-row code {
      display: block; font-family: monospace; font-size: 12px;
      background: rgba(255,255,255,0.06); padding: 8px 10px;
      border-radius: 6px; word-break: break-all; color: var(--text);
    }
    .key-warning {
      font-size: 12px; color: var(--yellow);
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 6px; padding: 8px 10px; margin-top: 8px;
    }

    /* ─── Uptime bars ───────────────────────────────────────────────────────── */
    .uptime-list { display: flex; flex-direction: column; gap: 16px; }
    .uptime-item { }
    .uptime-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .uptime-target { font-size: 14px; font-weight: 600; }
    .uptime-pct { font-size: 14px; font-weight: 700; }
    .uptime-pct.high { color: var(--green); }
    .uptime-pct.med { color: var(--yellow); }
    .uptime-pct.low { color: var(--red); }
    .uptime-bar-bg { height: 8px; background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; }
    .uptime-bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
    .uptime-bar-fill.high { background: linear-gradient(90deg, var(--green), #34d399); }
    .uptime-bar-fill.med { background: linear-gradient(90deg, var(--yellow), #fcd34d); }
    .uptime-bar-fill.low { background: linear-gradient(90deg, var(--red), #f87171); }
    .uptime-meta { display: flex; gap: 16px; margin-top: 4px; font-size: 11px; color: var(--text-muted); }

    /* ─── Incidents ─────────────────────────────────────────────────────────── */
    .incident-row td:first-child { border-left: 3px solid var(--red); }
    .diag-block {
      font-family: monospace; font-size: 11px;
      background: rgba(0,0,0,0.4); padding: 10px;
      border-radius: 6px; max-height: 120px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-dim);
    }

    /* ─── Toast ─────────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      z-index: 9999; display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      padding: 12px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: slideLeft 0.25s ease;
      display: flex; align-items: center; gap: 8px;
      max-width: 340px;
    }
    .toast-success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .toast-error   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .toast-info    { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }

    /* ─── Empty state ───────────────────────────────────────────────────────── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px; text-align: center; color: var(--text-muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
    .empty h3 { font-size: 16px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; }
    .empty p { font-size: 13px; max-width: 320px; line-height: 1.6; }

    /* ─── Skeleton loader ───────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px; height: 16px;
    }

    /* ─── Pulse dot ─────────────────────────────────────────────────────────── */
    .pulse { display: inline-flex; align-items: center; gap: 6px; }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .pulse-dot.green { background: var(--green); box-shadow: 0 0 0 0 var(--green-glow); }
    .pulse-dot.red   { background: var(--red);   box-shadow: 0 0 0 0 var(--red-glow);   }

    /* ─── Page title ────────────────────────────────────────────────────────── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .page-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ─── Form grid ─────────────────────────────────────────────────────────── */
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .form-grid-2 { grid-template-columns: 1fr; } }
    .form-row { margin-bottom: 14px; }

    /* ─── Destination type pill ─────────────────────────────────────────────── */
    .type-pill {
      display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .type-host    { background: rgba(59,130,246,0.15); color: #93c5fd; }
    .type-url     { background: rgba(139,92,246,0.15); color: #c4b5fd; }
    .type-subnet  { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .type-vmware  { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .type-custom  { background: rgba(100,116,139,0.15); color: #94a3b8; }

    /* ─── Responsive: hide sidebar on small screens ─────────────────────────── */
    #hamburger {
      display: none; background: none; border: none;
      font-size: 22px; cursor: pointer; color: var(--text);
    }
    @media (max-width: 768px) {
      #hamburger { display: block; }
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; }
      #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
      #overlay.show { display: block; }
    }

    /* ─── Animations ────────────────────────────────────────────────────────── */
    @keyframes fadeIn   { from { opacity:0; }           to { opacity:1; } }
    @keyframes slideUp  { from { transform:translateY(20px); opacity:0; } to { transform:none; opacity:1; } }
    @keyframes slideLeft{ from { transform:translateX(20px); opacity:0; } to { transform:none; opacity:1; } }
    @keyframes shimmer  { to { background-position: -200% 0; } }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 currentColor; }
      70%  { box-shadow: 0 0 0 6px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
  </style>
</head>
<body>

<!-- ── Auth Screen ──────────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Cy<span>pher</span></div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
    </div>

    <!-- Login form -->
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input id="login-username" type="text" autocomplete="username" placeholder="your_username" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button class="auth-submit" id="login-btn" type="submit">Login →</button>
    </form>

    <!-- Register form -->

        <label for="reg-password">Password <span style="color:var(--text-muted);font-size:11px">(min 8 chars)</span></label>
        <input id="reg-password" type="password" autocomplete="new-password" placeholder="••••••••" minlength="8" required />
      </div>
      <div class="form-group">
        <label for="reg-password2">Confirm Password</label>
        <input id="reg-password2" type="password" autocomplete="new-password" placeholder="••••••••" required />
      </div>
      <button class="auth-submit" id="reg-btn" type="submit">Create Account →</button>

    </form>

</div>

<div id="app" style="display:none">

      </div>

        <span class="icon">🤖</span> Agents
      </div>

<!-- ── Toast container ───────────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────────
const API = '';  // same-origin
let TOKEN = localStorage.getItem('cypher_token') || '';
let USER_KEY = localStorage.getItem('cypher_user_key') || '';
let USERNAME = localStorage.getItem('cypher_username') || '';
let currentPage = 'dashboard';
let refreshTimer = null;

// ─── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(TOKEN ? { Authorization: `Bearer ${TOKEN}` } : {})
    },
    ...(body ? { body: JSON.stringify(body) } : {})
  };
  const res = await fetch(API + path, opts);
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

// ─── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icons = { success: '✓', error: '✗', info: 'ℹ' };
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─── Auth ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const data = await api('POST', '/auth/login', {
      username: document.getElementById('login-username').value,
      password: document.getElementById('login-password').value
    });
    onLoginSuccess(data, document.getElementById('login-username').value);
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.textContent = 'Login →'; btn.disabled = false;
  }
}

async function doRegister(e) {
  e.preventDefault();
  const pw = document.getElementById('reg-password').value;
  const pw2 = document.getElementById('reg-password2').value;
  if (pw !== pw2) { toast('Passwords do not match', 'error'); return; }
  const btn = document.getElementById('reg-btn');
  btn.textContent = 'Creating…'; btn.disabled = true;
  try {
    const username = document.getElementById('reg-username').value;
    const data = await api('POST', '/auth/register', { username, password: pw });
    // Show key box
    document.getElementById('reg-key-value').textContent = data.user_key;
    document.getElementById('reg-key-box').style.display = '';
    toast('Account created! Save your user key.', 'success');
    setTimeout(() => onLoginSuccess(data, username), 3000);
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    btn.textContent = 'Create Account →'; btn.disabled = false;
  }
}

function onLoginSuccess(data, username) {
  TOKEN = data.token;
  USER_KEY = data.user_key;
  USERNAME = username;
  localStorage.setItem('cypher_token', TOKEN);
  localStorage.setItem('cypher_user_key', USER_KEY);
  localStorage.setItem('cypher_username', USERNAME);
  showApp();
}

function doLogout() {
  TOKEN = ''; USER_KEY = ''; USERNAME = '';
  localStorage.clear();
  location.reload();
}

// ─── App Shell ─────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebar-username').textContent = USERNAME;
  document.getElementById('sidebar-userkey').textContent = USER_KEY.slice(0, 16) + '…';
  document.getElementById('sidebar-avatar').textContent = USERNAME.charAt(0).toUpperCase();
  navigate('dashboard');
  startAutoRefresh();
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const titles = {
    dashboard: 'Dashboard', destinations: 'Destinations',
    agents: 'Agents', incidents: 'Incidents', uptime: 'Uptime'
  };
  document.getElementById('topbar-title').textContent = titles[page] || page;
  closeSidebar();
  renderPage(page);
}

function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (currentPage === 'dashboard') renderPage('dashboard');
  }, 30000);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ─── Router ─────────────────────────────────────────────────────────────────
function renderPage(page) {
  const pages = {
    dashboard: renderDashboard,
    destinations: renderDestinations,
    agents: renderAgents,
    incidents: renderIncidents,
    uptime: renderUptime
  };
  (pages[page] || (() => {}))();
}

// ─── Dashboard page ─────────────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('content');
  el.innerHTML = skeletonDashboard();
  try {
    const [statusData, incData, metricsData] = await Promise.all([
      api('GET', '/api/v1/status'),
      api('GET', '/api/v1/incidents?limit=5'),
      api('GET', '/api/v1/metrics/uptime')
    ]);
    const statuses = statusData.statuses || [];
    const up = statuses.filter(s => s.status === 'UP').length;
    const down = statuses.filter(s => s.status === 'DOWN').length;
    const incidents = incData.incidents || [];
    const metrics = metricsData.metrics || {};
    const avgUptime = Object.values(metrics).length
      ? (Object.values(metrics).reduce((a, m) => a + m.availability_percentage, 0) / Object.values(metrics).length).toFixed(1)
      : '—';

    el.innerHTML = `
      <div class="page-header">
        <div><h1>Dashboard</h1><p>Live monitoring overview</p></div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Targets UP</div><div class="stat-value green">${up}</div></div>
        <div class="stat-card"><div class="stat-label">Targets DOWN</div><div class="stat-value red">${down}</div></div>
        <div class="stat-card"><div class="stat-label">Total Targets</div><div class="stat-value blue">${statuses.length}</div></div>
        <div class="stat-card"><div class="stat-label">Avg Uptime (7d)</div><div class="stat-value" style="color:var(--text)">${avgUptime}${avgUptime !== '—' ? '%' : ''}</div></div>
      </div>

      <div class="card" style="margin-bottom:24px">
        <div class="card-header"><span class="card-title">Live Status</span></div>
        ${statuses.length === 0 ? emptyState('No data yet', 'Deploy an agent and it will appear here.') : `
        <div class="status-grid">
          ${statuses.map(s => statusCard(s)).join('')}
        </div>`}
      </div>

      ${incidents.length > 0 ? `
      <div class="card">
        <div class="card-header">
          <span class="card-title">Recent Incidents</span>
          <button class="btn btn-ghost btn-sm" onclick="navigate('incidents')">View all →</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Target</th><th>Agent</th><th>Error</th><th>Time</th></tr></thead>
            <tbody>
              ${incidents.map(i => `
              <tr>
                <td><strong>${e(i.target)}</strong></td>
                <td class="cell-muted">${e(i.agent_id)}</td>
                <td class="cell-muted" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(i.error || '—')}</td>
                <td class="cell-muted">${relTime(i.created_at)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}
    `;
  } catch (err) {
    el.innerHTML = errorState(err.message);
  }
}

function statusCard(s) {
  const cls = s.status === 'UP' ? 'up' : s.status === 'DOWN' ? 'down' : 'unknown';
  const badgeCls = s.status === 'UP' ? 'badge-up' : s.status === 'DOWN' ? 'badge-down' : 'badge-unknown';
  const lat = s.latency_ms != null ? `${s.latency_ms}<small> ms</small>` : '—';
  return `
    <div class="status-card ${cls}">
      <div class="status-header">
        <div>
          <div class="status-target">${e(s.target)}</div>
          <div class="status-agent">${e(s.agent_id)}</div>
        </div>
        <span class="badge ${badgeCls}">${e(s.status)}</span>
      </div>
      <div class="status-latency">${lat}</div>
      <div class="status-time">${relTime(s.received_at)}</div>
    </div>`;
}

function skeletonDashboard() {
  return `
    <div class="stats-row">
      ${[1,2,3,4].map(() => `<div class="stat-card"><div class="skeleton" style="width:60%;margin-bottom:10px"></div><div class="skeleton" style="width:40%;height:24px"></div></div>`).join('')}
    </div>
    <div class="card"><div class="skeleton" style="height:200px"></div></div>`;
}

// ─── Destinations page ───────────────────────────────────────────────────────
async function renderDestinations() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="page-header">
      <div><h1>Destinations</h1><p>The targets you want to monitor</p></div>
      <button class="btn btn-primary" id="dest-add-btn" onclick="openDestModal()">＋ Add Destination</button>
    </div>
    <div id="dest-table-wrap">
      <div class="skeleton" style="height:200px;border-radius:12px"></div>
    </div>`;
  await loadDestTable();
}

async function loadDestTable() {
  const wrap = document.getElementById('dest-table-wrap');
  if (!wrap) return;
  try {
    const data = await api('GET', '/api/v1/destinations');
    const dests = data || [];
    if (dests.length === 0) {
      wrap.innerHTML = `<div class="card">${emptyState('No destinations yet', 'Add your first destination to start monitoring.')}</div>`;
      return;
    }
    wrap.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>URL / Host</th><th>Type</th><th>Port</th><th>Tags</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${dests.map(d => `
            <tr>
              <td><strong>${e(d.name)}</strong>${d.description ? `<div class="cell-muted">${e(d.description)}</div>` : ''}</td>
              <td class="cell-code">${e(d.url)}</td>
              <td><span class="type-pill type-${d.type}">${e(d.type)}</span></td>
              <td class="cell-muted">${d.port || '—'}</td>
              <td class="cell-muted">${d.tags || '—'}</td>
              <td>${d.is_active ? '<span class="badge badge-up">Active</span>' : '<span class="badge badge-unknown">Inactive</span>'}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-ghost btn-sm" onclick="openDestModal(${JSON.stringify(d).replace(/"/g,'&quot;')})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteDest(${d.id}, '${e(d.name)}')">Delete</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (err) { wrap.innerHTML = errorState(err.message); }
}

function openDestModal(dest = null) {
  const isEdit = !!dest;
  const modal = createModal(`${isEdit ? 'Edit' : 'Add'} Destination`, `
    <div class="form-grid-2">
      <div class="form-row">
        <label>Name *</label>
        <input id="d-name" value="${isEdit ? e(dest.name) : ''}" placeholder="e.g. Production API" required />
      </div>
      <div class="form-row">
        <label>Type *</label>
        <select id="d-type">
          ${['host','url','subnet','vmware','custom'].map(t => `<option value="${t}" ${isEdit && dest.type===t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>URL / Host / Subnet *</label>
      <input id="d-url" value="${isEdit ? e(dest.url) : ''}" placeholder="e.g. api.example.com or 192.168.1.0/24" required />
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label>Port</label>
        <input id="d-port" type="number" min="1" max="65535" value="${isEdit && dest.port ? dest.port : ''}" placeholder="e.g. 443" />
      </div>
      <div class="form-row">
        <label>Tags</label>
        <input id="d-tags" value="${isEdit && dest.tags ? e(dest.tags) : ''}" placeholder="prod, critical" />
      </div>
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="d-desc" rows="2" placeholder="Optional notes…">${isEdit && dest.description ? e(dest.description) : ''}</textarea>
    </div>
    <div class="form-row" style="display:flex;align-items:center;gap:10px">
      <input type="checkbox" id="d-active" ${!isEdit || dest.is_active ? 'checked' : ''} style="width:auto" />
      <label for="d-active" style="margin:0">Active (monitored)</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="dest-save-btn" onclick="saveDest(${isEdit ? dest.id : 'null'})">${isEdit ? 'Save changes' : 'Create'}</button>
    </div>
  `);
}

async function saveDest(id) {
  const btn = document.getElementById('dest-save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  const body = {
    name: document.getElementById('d-name').value,
    url: document.getElementById('d-url').value,
    type: document.getElementById('d-type').value,
    port: document.getElementById('d-port').value ? parseInt(document.getElementById('d-port').value) : null,
    tags: document.getElementById('d-tags').value || null,
    description: document.getElementById('d-desc').value || null,
    is_active: document.getElementById('d-active').checked
  };
  try {
    if (id) { await api('PUT', `/api/v1/destinations/${id}`, body); toast('Destination updated', 'success'); }
    else     { await api('POST', '/api/v1/destinations', body);       toast('Destination created', 'success'); }
    closeModal();
    await loadDestTable();
  } catch (err) { toast(err.message, 'error'); }
  finally { btn.textContent = id ? 'Save changes' : 'Create'; btn.disabled = false; }
}

async function deleteDest(id, name) {
  if (!confirm(`Delete destination "${name}"?`)) return;
  try {
    await api('DELETE', `/api/v1/destinations/${id}`);
    toast('Destination deleted', 'success');
    await loadDestTable();
  } catch (err) { toast(err.message, 'error'); }
}

// ─── Agents page ─────────────────────────────────────────────────────────────
async function renderAgents() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="page-header">
      <div><h1>Agents</h1><p>Monitoring agents assigned to your destinations</p></div>
      <button class="btn btn-primary" onclick="openAgentModal()">＋ Register Agent</button>
    </div>
    <div id="agent-table-wrap">
      <div class="skeleton" style="height:200px;border-radius:12px"></div>
    </div>`;
  await loadAgentTable();
}

let cachedDestinations = [];

async function loadAgentTable() {
  const wrap = document.getElementById('agent-table-wrap');
  if (!wrap) return;
  try {
    const [agentsData, destsData] = await Promise.all([
      api('GET', '/api/v1/agents'),
      api('GET', '/api/v1/destinations')
    ]);
    cachedDestinations = destsData || [];
    const agents = agentsData || [];

    if (agents.length === 0) {
      wrap.innerHTML = `<div class="card">${emptyState('No agents registered', 'Create at least one destination, then register an agent.')}</div>`;
      return;
    }

    // Build dest name lookup
    const destMap = {};
    cachedDestinations.forEach(d => { destMap[d.id] = d.name; });

    wrap.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Location</th><th>Destinations</th><th>Key ID</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${agents.map(a => `
            <tr>
              <td><strong>${e(a.name)}</strong>${a.description ? `<div class="cell-muted">${e(a.description)}</div>` : ''}</td>
              <td class="cell-muted">${e(a.location || '—')}</td>
              <td class="cell-muted">${(a.destination_ids || []).map(id => e(destMap[id] || `#${id}`)).join(', ') || '—'}</td>
              <td>${a.key_id ? `<span class="cell-code">${e(a.key_id)}</span>` : '—'}</td>
              <td>${a.is_active ? '<span class="badge badge-up">Active</span>' : '<span class="badge badge-unknown">Inactive</span>'}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-ghost btn-sm" onclick="editAgent(${JSON.stringify(a).replace(/"/g,'&quot;')})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteAgent(${a.id}, '${e(a.name)}')">Delete</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (err) { wrap.innerHTML = errorState(err.message); }
}

async function openAgentModal() {
  // Ensure we have destinations
  let dests = cachedDestinations;
  if (!dests.length) {
    try { dests = cachedDestinations = await api('GET', '/api/v1/destinations') || []; }
    catch (e) { dests = []; }
  }
  if (!dests.length) {
    toast('Create at least one destination before registering an agent.', 'error');
    navigate('destinations');
    return;
  }
  createModal('Register Agent', `
    <div class="form-row">
      <label>Agent Name *</label>
      <input id="a-name" placeholder="e.g. HQ-Router-Agent" required />
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label>Location</label>
        <input id="a-location" placeholder="e.g. HQ, AWS-us-east" />
      </div>
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="a-desc" rows="2" placeholder="Optional notes…"></textarea>
    </div>
    <div class="form-row">
      <label>Destinations to monitor *</label>
      <div id="a-dest-list" style="display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:10px">
        ${dests.map(d => `
          <label style="display:flex;align-items:center;gap:8px;margin:0;cursor:pointer">
            <input type="checkbox" data-id="${d.id}" style="width:auto" />
            <span><strong>${e(d.name)}</strong> <span style="color:var(--text-muted);font-size:11px">${e(d.url)}</span></span>
          </label>`).join('')}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="agent-save-btn" onclick="saveAgent()">Register →</button>
    </div>
  `);
}

function editAgent(agent) {
  const dests = cachedDestinations;
  createModal('Edit Agent', `
    <div class="form-row">
      <label>Agent Name *</label>
      <input id="a-name" value="${e(agent.name)}" required />
    </div>
    <div class="form-row">
      <label>Location</label>
      <input id="a-location" value="${e(agent.location || '')}" />
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="a-desc" rows="2">${e(agent.description || '')}</textarea>
    </div>
    <div class="form-row" style="display:flex;align-items:center;gap:10px">
      <input type="checkbox" id="a-active" ${agent.is_active ? 'checked' : ''} style="width:auto" />
      <label for="a-active" style="margin:0">Active</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="agent-save-btn" onclick="updateAgent(${agent.id})">Save changes</button>
    </div>
  `);
}

async function saveAgent() {
  const btn = document.getElementById('agent-save-btn');
  btn.textContent = 'Registering…'; btn.disabled = true;
  const destIds = [...document.querySelectorAll('#a-dest-list input[type=checkbox]:checked')].map(el => parseInt(el.dataset.id));
  if (!destIds.length) { toast('Select at least one destination', 'error'); btn.textContent = 'Register →'; btn.disabled = false; return; }
  try {
    const data = await api('POST', '/api/v1/agents', {
      name: document.getElementById('a-name').value,
      location: document.getElementById('a-location').value || null,
      description: document.getElementById('a-desc').value || null,
      destination_ids: destIds
    });
    closeModal();
    // Show key reveal
    showKeyReveal(data);
    await loadAgentTable();
  } catch (err) { toast(err.message, 'error'); }
  finally { btn.textContent = 'Register →'; btn.disabled = false; }
}

async function updateAgent(id) {
  const btn = document.getElementById('agent-save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    await api('PUT', `/api/v1/agents/${id}`, {
      name: document.getElementById('a-name').value,
      location: document.getElementById('a-location').value || null,
      description: document.getElementById('a-desc').value || null,
      is_active: document.getElementById('a-active').checked
    });
    toast('Agent updated', 'success');
    closeModal();
    await loadAgentTable();
  } catch (err) { toast(err.message, 'error'); }
  finally { btn.textContent = 'Save changes'; btn.disabled = false; }
}

function showKeyReveal(data) {
  createModal('🎉 Agent Registered — Save Your Keys!', `
    <div class="key-reveal">
      <h4>⚠️ These credentials are shown ONCE — copy them now!</h4>
      <div class="key-row">
        <label>Key ID (AGENT_KEY_ID)</label>
        <code>${e(data.key_id)}</code>
      </div>
      <div class="key-row">
        <label>Key Secret (AGENT_KEY_SECRET)</label>
        <code>${e(data.key_secret)}</code>
      </div>
    </div>
    <div class="key-warning">
      Set these as environment variables on your agent:<br/>
      <code style="font-family:monospace;font-size:11px">AGENT_KEY_ID=${e(data.key_id)}<br/>AGENT_KEY_SECRET=${e(data.key_secret)}<br/>BACKEND_URL=https://your-cypher.onrender.com</code>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="closeModal()">I've saved the keys ✓</button>
    </div>
  `);
}

async function deleteAgent(id, name) {
  if (!confirm(`Delete agent "${name}"?`)) return;
  try {
    await api('DELETE', `/api/v1/agents/${id}`);
    toast('Agent deleted', 'success');
    await loadAgentTable();
  } catch (err) { toast(err.message, 'error'); }
}

// ─── Incidents page ──────────────────────────────────────────────────────────
async function renderIncidents() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="page-header"><div><h1>Incidents</h1><p>All detected outages</p></div></div>
    <div id="incidents-wrap"><div class="skeleton" style="height:300px;border-radius:12px"></div></div>`;
  try {
    const data = await api('GET', '/api/v1/incidents?limit=100');
    const incidents = data.incidents || [];
    if (!incidents.length) {
      document.getElementById('incidents-wrap').innerHTML = `<div class="card">${emptyState('No incidents recorded', 'All your targets are healthy — great!')}</div>`;
      return;
    }
    document.getElementById('incidents-wrap').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Target</th><th>Agent</th><th>Status</th><th>Root Cause</th><th>Error</th><th>Time</th></tr></thead>
          <tbody>
            ${incidents.map(i => `
            <tr class="incident-row">
              <td><strong>${e(i.target)}</strong></td>
              <td class="cell-muted">${e(i.agent_id)}</td>
              <td><span class="badge badge-down">${e(i.status)}</span></td>
              <td style="max-width:200px;font-size:12px;color:var(--text-dim)">${e(i.root_cause || '—')}</td>
              <td style="max-width:200px">
                ${i.error ? `<div class="diag-block">${e(i.error)}</div>` : '<span class="cell-muted">—</span>'}
              </td>
              <td class="cell-muted" style="white-space:nowrap">${relTime(i.created_at)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (err) { document.getElementById('incidents-wrap').innerHTML = errorState(err.message); }
}

// ─── Uptime page ─────────────────────────────────────────────────────────────
async function renderUptime() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="page-header"><div><h1>Uptime</h1><p>7-day availability by target</p></div></div>
    <div id="uptime-wrap"><div class="skeleton" style="height:300px;border-radius:12px"></div></div>`;
  try {
    const data = await api('GET', '/api/v1/metrics/uptime');
    const metrics = Object.values(data.metrics || {});
    if (!metrics.length) {
      document.getElementById('uptime-wrap').innerHTML = `<div class="card">${emptyState('No uptime data yet', 'Deploy an agent and let it run for a while.')}</div>`;
      return;
    }
    metrics.sort((a, b) => a.availability_percentage - b.availability_percentage);
    document.getElementById('uptime-wrap').innerHTML = `
      <div class="card">
        <div class="uptime-list">
          ${metrics.map(m => {
            const pct = m.availability_percentage;
            const cls = pct >= 99 ? 'high' : pct >= 95 ? 'med' : 'low';
            return `
            <div class="uptime-item">
              <div class="uptime-header">
                <span class="uptime-target">${e(m.target)}</span>
                <span class="uptime-pct ${cls}">${pct.toFixed(2)}%</span>
              </div>
              <div class="uptime-bar-bg">
                <div class="uptime-bar-fill ${cls}" style="width:${Math.min(pct,100)}%"></div>
              </div>
              <div class="uptime-meta">
                <span>↑ ${m.up_probes} up</span>
                <span>⟳ ${m.total_probes} total</span>
                <span>↓ ${m.total_probes - m.up_probes} down</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  } catch (err) { document.getElementById('uptime-wrap').innerHTML = errorState(err.message); }
}

// ─── Modal helpers ───────────────────────────────────────────────────────────
function createModal(title, body) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">${title}</div>
      ${body}
    </div>`;
  document.body.appendChild(overlay);
  return overlay;
}

function closeModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

// ─── Shared UI helpers ───────────────────────────────────────────────────────
function emptyState(title, text) {
  return `<div class="empty"><div class="empty-icon">📭</div><h3>${title}</h3><p>${text}</p></div>`;
}
function errorState(msg) {
  return `<div class="card"><div class="empty"><div class="empty-icon">⚠️</div><h3>Error</h3><p>${e(msg)}</p></div></div>`;
}
function e(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function relTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return `${Math.floor(diff/86400000)}d ago`;
}

// ─── Boot ────────────────────────────────────────────────────────────────────
if (TOKEN) {
  // Verify token is still valid
  api('GET', '/auth/me')
    .then(me => {
      USERNAME = me.username || USERNAME;
      localStorage.setItem('cypher_username', USERNAME);
      showApp();
    })
    .catch(() => {
      TOKEN = ''; localStorage.clear();
    });
}
</script>
